name: Create Archive

on:
  push:
    branches:
    - main

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4


    - name: Generate zip
      uses: 10up/action-wordpress-plugin-build-zip@stable
      env:
        SLUG: wc-ifudocs # optional, remove if GitHub repo name matches SVN slug, including capitalization
        BUILD_DIR: .